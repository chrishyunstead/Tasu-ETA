version = 0.1

[dev.global.parameters]
region = "ap-northeast-2"

[dev.build.parameters]
use_container = true
parallel = true
cached = true

[dev.deploy.parameters]
stack_name = "sam-delivery-eta-dev"
resolve_s3 = true
resolve_image_repos = true
profile = "your-aws-profile"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
parameter_overrides = "AccountEnv=\"dev\" EventBusName=\"sample-event-bus\" LambdaSecurityGroupId=\"/Sample/VPC/LambdaSecurityGroupId\" LambdaPrivateSubnetA=\"/Sample/VPC/PrivateSubnetA\" LambdaPrivateSubnetB=\"/Sample/VPC/PrivateSubnetB\" ModelS3Bucket=\"sample-model-bucket\" ModelS3Prefix=\"tasu-predict\" RouteResultS3Bucket=\"sample-route-result-bucket\" RouteResultApiUrl=\"https://example.lambda-url.ap-northeast-2.on.aws/route-results\" RouteResultApiHeaderName=\"\" RouteResultApiHeaderValue=\"\" OsrmBaseUrl=\"http://your-osrm-endpoint:5000\" WeightClipMin=\"0.7\" WeightClipMax=\"1.3\" EtaDynamoTableName=\"delivery_eta_latest\" DefaultTasuMinutes=\"5.0\""
