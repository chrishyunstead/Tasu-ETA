version = 0.1

[dev.global.parameters]
region = "ap-northeast-2"

[dev.build.parameters]
use_container = true
parallel = true
cached = true

[dev.deploy.parameters]
stack_name = "sam-delivery-eta-dev"
resolve_s3 = true
resolve_image_repos = true
profile = "<AWS_PROFILE>"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
parameter_overrides = "AccountEnv=\"dev\" EventBusName=\"<EVENT_BUS_NAME>\" LambdaSecurityGroupId=\"<SSM_PARAM_LAMBDA_SECURITY_GROUP_ID>\" LambdaPrivateSubnetA=\"<SSM_PARAM_PRIVATE_SUBNET_A>\" LambdaPrivateSubnetB=\"<SSM_PARAM_PRIVATE_SUBNET_B>\" ModelS3Bucket=\"<MODEL_S3_BUCKET>\" ModelS3Prefix=\"tasu-predict\" RouteResultS3Bucket=\"<ROUTE_RESULT_S3_BUCKET>\" RouteResultApiUrl=\"https://example.lambda-url.<REGION>.on.aws/route-results\" RouteResultApiHeaderName=\"\" RouteResultApiHeaderValue=\"\" OsrmBaseUrl=\"http://<OSRM_ENDPOINT>:5000\" WeightClipMin=\"0.7\" WeightClipMax=\"1.3\" EtaDynamoTableName=\"delivery_eta_latest\" DefaultTasuMinutes=\"5.0\""
